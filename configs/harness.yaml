runtime:
  maxSteps: 8
  requestTimeoutMs: 60000
  toolTimeoutMs: 30000
  enableStream: false
  maxConcurrentTools: 1
  toolErrorMode: throw
  modelRetry:
    maxRetries: 0
    initialBackoffMs: 250
    maxBackoffMs: 2000
    jitterRatio: 0
  budget:
    maxModelCalls: 20
    maxEstimatedTokens: 1000000
    maxContextCharacters: 120000
    reserveOutputTokens: 4000
  drift:
    maxToolCalls: 50
    repeatedToolWindow: 6
    repeatedToolThreshold: 1000000
    reflectionInterval: 0

model:
  provider: deepseek
  selection:
    enabled: false
    failureThreshold: 3
    resetTimeoutMs: 60000
    fallbackChain: []
  reasoning:
    strategy: disabled
    complexityThreshold: medium
    maxReasoningTokensPerSession: 100000
    maxReasoningCostPerSession: 0
  openai:
    model: gpt-5.5
    apiKeyEnv: OPENAI_API_KEY
    baseUrl: https://api.openai.com/v1
  deepseek:
    model: deepseek-v4-flash
    apiKeyEnv: DEEPSEEK_API_KEY
    baseUrl: https://api.deepseek.com
  temperature: 0.2
  maxTokens: 4096

outputGovernance:
  enabled: true
  mode: observe
  maxCorrectionTurns: 1
  allowUnknownTools: false
  strictAdditionalProperties: true
  injectionPatterns:
    - "rm -rf"
    - "DROP TABLE"
    - "<script"
    - "${jndi:"

memory:
  type: local
  rootDir: .miniharness/memory
  recentLimit: 20
  searchTopK: 5
  summary:
    enabled: true
    maxSummaryCharacters: 500
  context:
    systemPrompt: You are MiniHarness Agent.
    maxContextCharacters: 12000
    protectedCharacters: 2000
    minSectionCharacters: 200
    cache:
      enabled: true
      staticTtlMs: 600000
      dynamicTtlMs: 30000
  consolidation:
    enabled: true
    timeGateMs: 86400000
    sessionGate: 5
    contextUtilizationGate: 0.7
    minMessages: 8
    prune:
      expiredEntries: true
      lowConfidenceThreshold: 0.3
      staleDays: 30
  index:
    keyword:
      enabled: true
      minTokenLength: 2
    vector:
      enabled: false

tools:
  enableBuiltin: true
  allowShell: false
  allowFile: false
  allowHttp: false

mcp:
  enable: false
  protocolVersion: 2025-06-18
  requestTimeoutMs: 30000
  discoveryCacheTtlMs: 300000
  clientInfo:
    name: MiniHarness
    version: 0.1.0
  servers:
    - name: local-tools
      transport: streamable_http
      endpoint: http://127.0.0.1:3001/mcp
      namePrefix: mcp_local_tools

orchestration:
  enabled: true
  defaultRole: default
  maxRetries: 1
  continueOnFailure: true
  maxConcurrentTasks: 1
  defaultTaskTimeoutMs: 300000
  retry:
    initialBackoffMs: 250
    maxBackoffMs: 5000
  checkpoint:
    enabled: true
    store: memory
    rootDir: .miniharness/orchestration/checkpoints
  messages:
    maxQueueSize: 1000
    requireAckByDefault: false
  scratchpad:
    maxEntries: 1000
    maxValueCharacters: 20000

production:
  environment: development
  featureGates:
    schemaCache: true
    modularPrompt: true
    metrics: true
  prompt:
    cacheBoundaryCharacters: 48000
    exposeMetadata: true
  schemaCache:
    enabled: true
    maxEntries: 1000
  metrics:
    enabled: true
    latencyWarningMs: 2000
    errorRateWarningThreshold: 0.01

security:
  sandboxDir: ./workspace
  allowNetwork: false
  allowShell: false
  allowShellCommands: []

reliability:
  enableTrace: true
